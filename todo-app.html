<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lista de Tarefas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    input[type="text"] {
      flex: 1;
      padding: 8px;
      font-size: 14px;
      border: 1px solid #aaa;
      border-radius: 4px;
    }

    button {
      padding: 8px 14px;
      background-color: #4a90d9;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background-color: #357abd;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    li:last-child {
      border-bottom: none;
    }

    li.concluida span {
      text-decoration: line-through;
      color: #999;
    }

    li span {
      flex: 1;
      font-size: 14px;
    }

    .btn-concluir {
      background-color: #5cb85c;
      padding: 5px 10px;
      font-size: 12px;
    }

    .btn-concluir:hover {
      background-color: #4cae4c;
    }

    .btn-remover {
      background-color: #d9534f;
      padding: 5px 10px;
      font-size: 12px;
    }

    .btn-remover:hover {
      background-color: #c9302c;
    }

    .contador {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-top: 12px;
    }

    .vazio {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      padding: 20px 0;
    }
  </style>
</head>
<body>

  <h1>📝 Lista de Tarefas</h1>

  <div class="container">
    <div class="input-area">
      <input type="text" id="campo-tarefa" placeholder="Digite uma tarefa..." />
      <button onclick="adicionarTarefa()">Adicionar</button>
    </div>

    <ul id="lista"></ul>

    <p class="vazio" id="msg-vazia">Nenhuma tarefa adicionada.</p>

    <p class="contador" id="contador"></p>
  </div>

  <script>
    var tarefas = [];

    document.getElementById('campo-tarefa').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') adicionarTarefa();
    });

    function adicionarTarefa() {
      var campo = document.getElementById('campo-tarefa');
      var texto = campo.value.trim();

      if (texto === '') {
        alert('Por favor, digite uma tarefa!');
        return;
      }

      var tarefa = {
        id: Date.now(),
        texto: texto,
        concluida: false
      };

      tarefas.push(tarefa);
      campo.value = '';
      renderizar();
    }

    function concluirTarefa(id) {
      for (var i = 0; i < tarefas.length; i++) {
        if (tarefas[i].id === id) {
          tarefas[i].concluida = !tarefas[i].concluida;
          break;
        }
      }
      renderizar();
    }

    function removerTarefa(id) {
      tarefas = tarefas.filter(function(t) { return t.id !== id; });
      renderizar();
    }

    function renderizar() {
      var lista = document.getElementById('lista');
      var msgVazia = document.getElementById('msg-vazia');
      var contador = document.getElementById('contador');

      lista.innerHTML = '';

      if (tarefas.length === 0) {
        msgVazia.style.display = 'block';
        contador.textContent = '';
        return;
      }

      msgVazia.style.display = 'none';

      for (var i = 0; i < tarefas.length; i++) {
        var t = tarefas[i];
        var li = document.createElement('li');
        if (t.concluida) li.className = 'concluida';

        li.innerHTML =
          '<span>' + t.texto + '</span>' +
          '<button class="btn-concluir" onclick="concluirTarefa(' + t.id + ')">' +
            (t.concluida ? 'Desfazer' : 'Concluir') +
          '</button>' +
          '<button class="btn-remover" onclick="removerTarefa(' + t.id + ')">Remover</button>';

        lista.appendChild(li);
      }

      var concluidas = tarefas.filter(function(t) { return t.concluida; }).length;
      contador.textContent = concluidas + ' de ' + tarefas.length + ' tarefas concluídas';
    }

    renderizar();
  </script>

</body>
</html>
